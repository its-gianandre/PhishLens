<!doctype html>
<!-- Harmless simulation of a Microsoft-branded phishing login. Dummy endpoint; use fake credentials only. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign in to your Microsoft account</title>
  <meta name="description" content="Use your Microsoft account to sign in to Outlook, Office 365 and OneDrive.">
</head>
<body style="font-family: 'Segoe UI', sans-serif; max-width: 400px; margin: 60px auto;">
  <h1 style="color:#0067b8;">Microsoft</h1>
  <h2>Sign in</h2>
  <p>Use your Microsoft account to continue to Outlook.</p>
  <form action="?step=password" method="post">
    <p><input type="email" name="loginfmt" placeholder="Email, phone, or Skype" style="width:100%"></p>
    <p><input type="password" name="passwd" placeholder="Password" style="width:100%"></p>
    <p><button type="submit" style="background:#0067b8;color:#fff;border:0;padding:8px 24px;">Sign in</button></p>
  </form>
  <p><a href="#">Can't access your account?</a></p>
</body>
</html>
