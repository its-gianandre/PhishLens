<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPhish Demo - Account Verification</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0c1423;
      color: #f7f9fc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #131f32;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h2 { margin-top: 0; color: #f472b6; }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Account Security Alert</h2>
    <p>Please confirm your login details to secure your account.</p>
    <form onsubmit="event.preventDefault();">
      <label>Email Address</label>
      <input type="email" placeholder="user@example.com" required>
      <label>Password</label>
      <input type="password" placeholder="••••••••" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
