<!doctype html>
<!-- Harmless simulation: an ordinary first-party login page. Dummy endpoint; use fake credentials only. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Acme Notes — Sign in</title>
  <meta name="description" content="Sign in to your Acme Notes workspace.">
</head>
<body style="font-family: sans-serif; max-width: 380px; margin: 60px auto;">
  <h1>Acme Notes</h1>
  <p>Welcome back. Sign in to continue to your workspace.</p>
  <form action="/session" method="post">
    <p><label>Email<br><input type="email" name="email" autocomplete="username"></label></p>
    <p><label>Password<br><input type="password" name="password" autocomplete="current-password"></label></p>
    <p><button type="submit">Sign in</button></p>
  </form>
  <p><a href="#">Forgot your password?</a></p>
</body>
</html>
